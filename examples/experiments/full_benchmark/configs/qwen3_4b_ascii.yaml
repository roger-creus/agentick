name: qwen3-4b-ascii
description: "Qwen3-4B-Instruct LLM, markovian zero-shot, ASCII observations"
agent:
  type: llm
  hyperparameters:
    backend: huggingface_llm
    model: Qwen/Qwen3-4B-Instruct
    harness: markovian_zero_shot
    observation_modes: [ascii]
    device: auto
    dtype: bfloat16
    max_new_tokens: 50
    temperature: 0.0
tasks: "full"
difficulties: [easy, medium, hard, expert]
training: null
n_episodes: 3
n_seeds: 3
render_modes: [ascii]
record_trajectories: true
record_videos: false
output_dir: results/llm_benchmarks
tags: [llm, ascii, qwen3-4b, benchmark]
metrics: [mean_return, success_rate, mean_length, mean_latency, total_tokens]
