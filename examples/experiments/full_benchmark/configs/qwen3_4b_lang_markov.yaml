name: qwen3_4b_lang_markov
description: Qwen3-4B-Instruct-2507 LLM, markovian zero-shot, language observations
agent:
  type: llm
  hyperparameters:
    backend: huggingface_llm
    model: Qwen/Qwen3-4B-Instruct-2507
    harness: markovian_zero_shot
    observation_modes:
    - language
    device: auto
    dtype: bfloat16
    max_new_tokens: 50
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 5
n_seeds: 5
render_modes:
- language
record_trajectories: true
record_videos: true
output_dir: results/llm_benchmarks
tags:
- llm
- qwen3-4b
- benchmark
- lang
- markov
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
