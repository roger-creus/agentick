name: qwen3-vl-4b
description: "Qwen2.5-VL-3B-Instruct VLM, markovian zero-shot, pixel observations"
agent:
  type: vlm
  hyperparameters:
    backend: huggingface_vlm
    model: Qwen/Qwen2.5-VL-3B-Instruct
    harness: markovian_zero_shot
    observation_modes: [rgb_array]
    device: auto
    dtype: bfloat16
    max_new_tokens: 50
    temperature: 0.0
tasks: "full"
difficulties: [easy, medium, hard, expert]
training: null
n_episodes: 3
n_seeds: 3
render_modes: [rgb_array]
record_trajectories: true
record_videos: true
output_dir: results/vlm_benchmarks
tags: [vlm, pixel, qwen-vl, benchmark]
metrics: [mean_return, success_rate, mean_length, mean_latency, total_tokens]
