name: qwen3_30b_a3b_lang_nonmarkov_reasoner
description: Qwen3-30B-A3B-Instruct-2507 LLM, non-markovian reasoner (CoT+history), language observations
agent:
  type: llm
  hyperparameters:
    backend: vllm_llm
    model: Qwen/Qwen3-30B-A3B-Instruct-2507
    harness: non_markovian_reasoner
    observation_modes:
    - language
    dtype: bfloat16
    max_new_tokens: 16384
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    gpu_memory_utilization: 0.9
    enable_prefix_caching: true
    tensor_parallel_size: 4
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 5
n_seeds: 5
render_modes:
- language
record_trajectories: true
record_videos: true
output_dir: results/llm_benchmarks
tags:
- llm
- qwen3-30b-a3b
- benchmark
- lang
- nonmarkov-reasoner
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
