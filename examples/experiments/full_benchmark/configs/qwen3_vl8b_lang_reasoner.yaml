name: qwen3_vl8b_lang_reasoner
description: Qwen3-VL-8B-Instruct VLM, markovian reasoner (CoT), pixel+language observations
agent:
  type: vlm
  hyperparameters:
    backend: huggingface_vlm
    model: Qwen/Qwen3-VL-8B-Instruct
    harness: markovian_reasoner
    observation_modes:
    - rgb_array
    - language
    device: auto
    dtype: bfloat16
    max_new_tokens: 4096
    temperature: 0.0
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 5
n_seeds: 5
render_modes:
- rgb_array
record_trajectories: true
record_videos: true
output_dir: results/vlm_benchmarks
tags:
- vlm
- qwen3-vl-8b
- benchmark
- lang
- reasoner
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
