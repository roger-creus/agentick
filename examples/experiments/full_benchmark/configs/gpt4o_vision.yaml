name: gpt4o-vision
description: "GPT-4o via OpenAI API, markovian zero-shot, pixel observations (VLM)"
agent:
  type: vlm
  hyperparameters:
    backend: openai
    model: gpt-4o
    harness: markovian_zero_shot
    observation_modes: [rgb_array]
    api_key_env: OPENAI_API_KEY
    max_tokens: 100
    temperature: 0.7
tasks: "full"
difficulties: [easy, medium, hard, expert]
training: null
n_episodes: 3
n_seeds: 3
render_modes: [rgb_array]
record_trajectories: true
record_videos: true
output_dir: results/api_benchmarks
tags: [vlm, pixel, gpt4o, api, benchmark]
metrics: [mean_return, success_rate, mean_length, mean_latency, total_tokens, total_api_calls]
