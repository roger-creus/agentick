name: qwen3_vl8b_ascii_markov
description: Qwen3-VL-8B-Instruct VLM, markovian zero-shot, pixel+ASCII observations
agent:
  type: vlm
  hyperparameters:
    backend: huggingface_vlm
    model: Qwen/Qwen3-VL-8B-Instruct
    harness: markovian_zero_shot
    observation_modes:
    - rgb_array
    - ascii
    device: auto
    dtype: bfloat16
    max_new_tokens: 50
    temperature: 0.0
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 5
n_seeds: 5
render_modes:
- rgb_array
record_trajectories: true
record_videos: true
output_dir: results/vlm_benchmarks
tags:
- vlm
- qwen3-vl-8b
- benchmark
- ascii
- markov
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
