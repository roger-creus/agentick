name: gpt4o-ascii
description: "GPT-4o via OpenAI API, markovian zero-shot, ASCII observations"
agent:
  type: llm
  hyperparameters:
    backend: openai
    model: gpt-4o
    harness: markovian_zero_shot
    observation_modes: [ascii]
    api_key_env: OPENAI_API_KEY
    max_tokens: 100
    temperature: 0.7
tasks: "full"
difficulties: [easy, medium, hard, expert]
training: null
n_episodes: 3
n_seeds: 3
render_modes: [ascii]
record_trajectories: true
record_videos: true
output_dir: results/api_benchmarks
tags: [llm, ascii, gpt4o, api, benchmark]
metrics: [mean_return, success_rate, mean_length, mean_latency, total_tokens, total_api_calls]
