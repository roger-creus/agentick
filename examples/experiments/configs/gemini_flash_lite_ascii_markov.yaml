name: gemini-flash-lite-ascii-markov
description: Gemini 2.5 Flash Lite via Google API, markovian zero-shot, ASCII observations
agent:
  type: llm
  hyperparameters:
    backend: gemini
    model: gemini-2.5-flash-lite
    harness: markovian_zero_shot
    observation_modes:
    - ascii
    api_key_env: GEMINI_API_KEY
    max_tokens: 128
    temperature: 1.0
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 1
n_seeds: 25
render_modes:
- ascii
record_trajectories: true
record_videos: true
output_dir: results/api_benchmarks
tags:
- llm
- ascii
- gemini
- flash-lite
- api
- benchmark
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
- total_api_calls
- total_cost_usd
split: eval
