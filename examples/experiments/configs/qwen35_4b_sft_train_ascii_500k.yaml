name: qwen35_4b_sft_train_ascii_500k
description: SFT training job — Qwen3.5-4B LoRA on 500k ASCII oracle trajectories
job_type: sft_train
training:
  dataset: rogercc/agentick-oracle-trajectories-500k
  model: Qwen/Qwen3.5-4B
  modality: ascii
  epochs: 3
  lr: 4.0e-5
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  batch_size: 4
  grad_accum: 4
  max_seq_length: 2048
  packing: true
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler: cosine
  attn_implementation: sdpa
  gradient_checkpointing: true
  wandb_project: agentick-sft
  run_name: sft-qwen35-4b-ascii-500k
push_to_hub: rogercc/agentick-qwen35-4b-sft-ascii-500k
tags: [sft, qwen35-4b, ascii, 500k]
