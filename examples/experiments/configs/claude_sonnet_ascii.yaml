name: claude-sonnet-ascii
description: "Claude Sonnet via Anthropic API, markovian zero-shot, ASCII observations"
agent:
  type: llm
  hyperparameters:
    backend: anthropic
    model: claude-sonnet-4-20250514
    harness: markovian_zero_shot
    observation_modes: [ascii]
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 100
    temperature: 0.7
tasks: "full"
difficulties: [easy, medium, hard, expert]
training: null
n_episodes: 3
n_seeds: 3
render_modes: [ascii]
record_trajectories: true
record_videos: true
output_dir: results/api_benchmarks
tags: [llm, ascii, claude, api, benchmark]
metrics: [mean_return, success_rate, mean_length, mean_latency, total_tokens, total_api_calls]
