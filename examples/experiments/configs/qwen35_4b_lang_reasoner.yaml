name: qwen35_4b_lang_reasoner
description: Qwen3.5-4B LLM, markovian reasoner (CoT), language observations
agent:
  type: llm
  hyperparameters:
    backend: vllm_llm
    model: Qwen/Qwen3.5-4B
    harness: markovian_reasoner
    observation_modes:
    - language
    dtype: float16
    max_new_tokens: 8192
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    gpu_memory_utilization: 0.9
    enable_prefix_caching: true
    tensor_parallel_size: 1
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 1
n_seeds: 25
render_modes:
- language
record_trajectories: true
record_videos: true
output_dir: results/llm_benchmarks
tags:
- llm
- qwen35-4b
- benchmark
- lang
- reasoner
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
split: eval
