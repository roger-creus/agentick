name: claude-haiku-lang-reasoner
description: Claude Haiku 4.5 via Anthropic API, markovian reasoner, language observations
agent:
  type: llm
  hyperparameters:
    backend: anthropic
    model: claude-haiku-4-5-20251001
    harness: markovian_reasoner
    observation_modes:
    - language
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    temperature: 1.0
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 1
n_seeds: 25
render_modes:
- language
record_trajectories: true
record_videos: true
output_dir: results/api_benchmarks
tags:
- llm
- language
- claude-haiku
- reasoner
- api
- benchmark
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
- total_api_calls
- total_cost_usd
split: eval
