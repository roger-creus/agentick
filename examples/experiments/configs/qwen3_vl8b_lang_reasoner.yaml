name: qwen3_vl8b_lang_reasoner
description: Qwen3-VL-8B-Instruct VLM, markovian reasoner (CoT), pixel+language observations
agent:
  type: vlm
  hyperparameters:
    backend: vllm_vlm
    model: Qwen/Qwen3-VL-8B-Instruct
    harness: markovian_reasoner
    observation_modes:
    - rgb_array
    - language
    dtype: float16
    max_new_tokens: 16384
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    gpu_memory_utilization: 0.9
    enable_prefix_caching: true
    tensor_parallel_size: 2
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 1
n_seeds: 25
render_modes:
- rgb_array
record_trajectories: true
record_videos: true
output_dir: results/vlm_benchmarks
tags:
- vlm
- qwen3-vl-8b
- benchmark
- lang
- reasoner
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
split: eval
