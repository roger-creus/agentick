name: gpt5mini-ascii-markov
description: GPT-5 Mini via OpenAI API, markovian zero-shot, ASCII observations
agent:
  type: llm
  hyperparameters:
    backend: openai
    model: gpt-5-mini-2025-08-07
    harness: markovian_zero_shot
    observation_modes:
    - ascii
    api_key_env: OPENAI_API_KEY
    max_tokens: 128
    temperature: 1.0
tasks: full
difficulties:
- easy
- medium
- hard
- expert
training: null
n_episodes: 1
n_seeds: 25
render_modes:
- ascii
record_trajectories: true
record_videos: true
output_dir: results/api_benchmarks
tags:
- llm
- ascii
- gpt5mini
- api
- benchmark
metrics:
- mean_return
- success_rate
- mean_length
- mean_latency
- total_tokens
- total_api_calls
- total_cost_usd
split: eval
