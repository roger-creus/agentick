name: Update Leaderboard

on:
  push:
    branches: [main]
    paths:
      - 'leaderboard_data/**'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday midnight UTC
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra leaderboard

      - name: Generate leaderboard site
        run: |
          uv run python -m agentick.leaderboard.generate_site

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./leaderboard_site
          publish_branch: gh-pages-leaderboard